name: Build and publish Conda packages

on:
  workflow_dispatch:

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.metadata.outputs.name }}
      version: ${{ steps.metadata.outputs.version }}
      build: ${{ steps.metadata.outputs.build }}
      source: ${{ steps.metadata.outputs.source }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          pip install jinja2-cli
          sudo apt-get update && sudo apt-get install -y yq jq

      - name: Render meta.yaml and extract info
        id: metadata
        run: |
          jinja2 goats-feedstock/recipe/meta.yaml > ${{ runner.temp }}/rendered.yaml
          name=$(yq '.package.name' ${{ runner.temp }}/rendered.yaml)
          version=$(yq '.package.version' ${{ runner.temp }}/rendered.yaml)
          build=$(yq '.build.number' ${{ runner.temp }}/rendered.yaml)
          source=$(yq '.source.url' ${{ runner.temp }}/rendered.yaml)

          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "build=$build" >> "$GITHUB_OUTPUT"
          echo "source=$source" >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-latest
    needs: metadata
    steps:
      - run: echo ${{ needs.metadata.outputs.name }}

